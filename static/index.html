<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Insider Threat Monitor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; width: 100%; overflow: hidden; }
    body { background: #0f172a; font-family: 'Segoe UI', system-ui, sans-serif; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1e293b; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #475569; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useReducer, useEffect, useRef, useCallback } = React;

    // -------------------------------------------------------------------------
    // Constants
    // -------------------------------------------------------------------------
    const API_BASE       = '/api';
    const POLL_INTERVAL  = 5000;
    const MAX_EVENTS     = 500;

    const RISK = {
      HIGH: { bg: '#fee2e2', color: '#991b1b', border: '#fca5a5', dot: '#ef4444' },
      MED:  { bg: '#fef3c7', color: '#92400e', border: '#fcd34d', dot: '#f59e0b' },
      LOW:  { bg: '#d1fae5', color: '#065f46', border: '#6ee7b7', dot: '#10b981' },
    };

    // -------------------------------------------------------------------------
    // Demo mode
    // -------------------------------------------------------------------------
    const DEMO_HOSTS    = ['DESKTOP-ALICE','LAPTOP-BOB','WS-CHARLIE','FINANCE-01','HR-PC-02'];
    const DEMO_PROCS    = [
      ['chrome.exe','LOW'],['excel.exe','LOW'],['outlook.exe','LOW'],
      ['wireshark.exe','HIGH'],['psexec.exe','HIGH'],['mimikatz.exe','HIGH'],
      ['nmap.exe','HIGH'],['putty.exe','MED'],['filezilla.exe','MED'],['procmon.exe','MED'],
    ];
    const DEMO_KEYWORDS = ['password','api_key','-----BEGIN PRIVATE KEY','ssn','credit card'];
    const DEMO_WINDOWS  = ['Excel - Q4_Salaries.xlsx','Chrome - Gmail','Notepad - credentials.txt','FileZilla','PowerShell'];
    const DEMO_TYPES    = [
      {type:'PROCESS',w:35},{type:'CLIPBOARD',w:10},{type:'USB_INSERT',w:8},
      {type:'USB_REMOVE',w:6},{type:'WINDOW',w:30},{type:'NETWORK_UPLOAD',w:6},
    ];

    let _demoId = 10000;
    function pickW(arr){ let r=Math.random()*arr.reduce((s,x)=>s+x.w,0); for(const x of arr){r-=x.w;if(r<=0)return x;} return arr[arr.length-1]; }
    function rand(a){ return a[Math.floor(Math.random()*a.length)]; }

    function genDemoEvent() {
      const host = rand(DEMO_HOSTS);
      const cid  = host.toLowerCase().replace(/-/g,'');
      const {type} = pickW(DEMO_TYPES);
      const ah = Math.random()<0.2;
      let data={},level='LOW',score=10;

      if(type==='PROCESS'){
        const [name,lvl]=rand(DEMO_PROCS);
        level=lvl;
        score=lvl==='HIGH'?80+Math.floor(Math.random()*20):lvl==='MED'?50+Math.floor(Math.random()*25):10+Math.floor(Math.random()*30);
        data={name,pid:1000+Math.floor(Math.random()*30000)};
      } else if(type==='CLIPBOARD'){
        level='HIGH'; score=75+Math.floor(Math.random()*20);
        data={keyword:rand(DEMO_KEYWORDS),char_count:50+Math.floor(Math.random()*500)};
      } else if(type==='USB_INSERT'){
        level='MED'; score=50; data={event:'arrival',device_type:'mass_storage'};
      } else if(type==='USB_REMOVE'){
        level='LOW'; score=40; data={event:'removal',device_type:'mass_storage'};
      } else if(type==='WINDOW'){
        level='LOW'; score=0; data={title:rand(DEMO_WINDOWS)};
      } else if(type==='NETWORK_UPLOAD'){
        const mb=10+Math.floor(Math.random()*90);
        level=ah?'HIGH':'MED'; score=ah?90:70;
        data={bytes_out:mb*1024*1024,window_sec:30};
      }
      if(ah&&score>0){score=Math.min(100,score+20);level=score>=80?'HIGH':score>=50?'MED':'LOW';}
      return {id:++_demoId,timestamp:new Date().toISOString(),client_id:cid,hostname:host,event_type:type,data_json:JSON.stringify(data),risk_score:score,risk_level:level,after_hours:ah};
    }

    function buildDemoClients(events) {
      const m={};
      for(const e of events){
        if(!m[e.client_id]) m[e.client_id]={client_id:e.client_id,hostname:e.hostname,ip:'192.168.1.'+(Math.floor(Math.random()*200)+10),last_seen:e.timestamp,max_risk_score:e.risk_score};
        else { if(e.risk_score>m[e.client_id].max_risk_score) m[e.client_id].max_risk_score=e.risk_score; }
      }
      return Object.values(m).sort((a,b)=>b.max_risk_score-a.max_risk_score);
    }

    // -------------------------------------------------------------------------
    // Reducer
    // -------------------------------------------------------------------------
    const initialState = {
      events:[],clients:[],
      stats:{total:0,high:0,med:0,low:0,active_clients:0},
      filter:'ALL',selectedClient:null,demoMode:false,error:null,
    };

    function reducer(state,action){
      switch(action.type){
        case 'PREPEND': {
          const merged=[...action.payload,...state.events].slice(0,MAX_EVENTS);
          return {...state,events:merged,error:null};
        }
        case 'SET_CLIENTS':  return {...state,clients:action.payload};
        case 'SET_STATS':    return {...state,stats:action.payload};
        case 'SET_FILTER':   return {...state,filter:action.payload};
        case 'SELECT':       return {...state,selectedClient:action.payload};
        case 'SET_ERROR':    return {...state,error:action.payload};
        case 'TOGGLE_DEMO': {
          const on=!state.demoMode;
          const seed=on?Array.from({length:15},genDemoEvent).reverse():[];
          return {...initialState,demoMode:on,events:seed};
        }
        default: return state;
      }
    }

    // -------------------------------------------------------------------------
    // Helpers
    // -------------------------------------------------------------------------
    function fmtTime(ts){
      if(!ts) return '';
      try{ return new Date(ts).toLocaleString(undefined,{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit'}); }
      catch{ return ts; }
    }
    function fmtBytes(n){
      if(n==null) return '';
      if(n>=1073741824) return (n/1073741824).toFixed(1)+' GB';
      if(n>=1048576)    return (n/1048576).toFixed(1)+' MB';
      if(n>=1024)       return (n/1024).toFixed(1)+' KB';
      return n+' B';
    }
    function parseData(ev){
      try{ return typeof ev.data_json==='string'?JSON.parse(ev.data_json):ev.data_json; }
      catch{ return {}; }
    }
    function summary(ev){
      const d=parseData(ev);
      switch(ev.event_type){
        case 'PROCESS':        return `${d.name||'?'} (PID ${d.pid||'?'})`;
        case 'CLIPBOARD':      return `Keyword: "${d.keyword||'?'}" — ${d.char_count||'?'} chars`;
        case 'USB_INSERT':     return `USB arrived (${d.device_type||'unknown'})`;
        case 'USB_REMOVE':     return `USB removed (${d.device_type||'unknown'})`;
        case 'WINDOW':         return d.title?`"${d.title}"`:'(no title)';
        case 'NETWORK_UPLOAD': return `${fmtBytes(d.bytes_out)} uploaded in ${d.window_sec||30}s`;
        default:               return ev.data_json||'';
      }
    }
    function lvlOf(score){ return score>=80?'HIGH':score>=50?'MED':'LOW'; }

    const TYPE_COLOR = {
      PROCESS:'#7c3aed',CLIPBOARD:'#d97706',USB_INSERT:'#0891b2',
      USB_REMOVE:'#6b7280',WINDOW:'#374151',NETWORK_UPLOAD:'#dc2626',
    };

    // -------------------------------------------------------------------------
    // Components
    // -------------------------------------------------------------------------
    function RiskBadge({level,score}){
      const s=RISK[level]||RISK.LOW;
      return (
        <span style={{display:'inline-flex',alignItems:'center',gap:4,padding:'2px 8px',borderRadius:9999,
          fontSize:11,fontWeight:700,letterSpacing:'0.05em',
          background:s.bg,color:s.color,border:`1px solid ${s.border}`,whiteSpace:'nowrap'}}>
          <span style={{width:6,height:6,borderRadius:'50%',background:s.dot,flexShrink:0}}/>
          {level}{score!=null?' '+score:''}
        </span>
      );
    }

    function TopBar({demoMode,onToggle,error}){
      return (
        <div style={{background:'#0f172a',color:'#f8fafc',padding:'0 24px',height:56,
          display:'flex',alignItems:'center',justifyContent:'space-between',
          borderBottom:'1px solid #1e293b',flexShrink:0}}>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <span style={{fontSize:18,fontWeight:700,letterSpacing:'-0.02em'}}>
              ⚠ Insider Threat Monitor
            </span>
            {error&&<span style={{fontSize:12,color:'#fca5a5',background:'#450a0a',
              border:'1px solid #7f1d1d',borderRadius:6,padding:'2px 10px'}}>{error}</span>}
          </div>
          <div style={{display:'flex',alignItems:'center',gap:16}}>
            <span style={{fontSize:12,color:'#475569'}}>
              {demoMode?'Demo data — no agent required':'Live — polling every 5s'}
            </span>
            <button onClick={onToggle} style={{padding:'6px 16px',borderRadius:8,border:'none',cursor:'pointer',
              fontWeight:600,fontSize:13,background:demoMode?'#7c3aed':'#334155',
              color:demoMode?'#ede9fe':'#94a3b8'}}>
              {demoMode?'Demo ON':'Demo OFF'}
            </button>
          </div>
        </div>
      );
    }

    function StatCard({label,value,accent}){
      return (
        <div style={{background:'#1e293b',border:'1px solid #334155',borderRadius:10,
          padding:'14px 20px',flex:1,minWidth:120}}>
          <div style={{fontSize:28,fontWeight:800,color:accent||'#f1f5f9',lineHeight:1}}>{value}</div>
          <div style={{fontSize:12,color:'#94a3b8',marginTop:4,fontWeight:500}}>{label}</div>
        </div>
      );
    }

    function StatCards({stats}){
      return (
        <div style={{display:'flex',gap:12,padding:'16px 20px 0',flexShrink:0,flexWrap:'wrap'}}>
          <StatCard label="Total Events"   value={stats.total}          accent="#e2e8f0"/>
          <StatCard label="High Risk"      value={stats.high}           accent="#f87171"/>
          <StatCard label="Medium Risk"    value={stats.med}            accent="#fbbf24"/>
          <StatCard label="Low Risk"       value={stats.low}            accent="#34d399"/>
          <StatCard label="Active Clients" value={stats.active_clients} accent="#60a5fa"/>
        </div>
      );
    }

    function ClientSidebar({clients,selected,onSelect}){
      return (
        <div style={{width:230,flexShrink:0,background:'#0f172a',
          borderRight:'1px solid #1e293b',overflowY:'auto',display:'flex',flexDirection:'column'}}>
          <div style={{padding:'12px 16px 8px',fontSize:11,fontWeight:700,color:'#475569',
            letterSpacing:'0.08em',textTransform:'uppercase',borderBottom:'1px solid #1e293b'}}>
            Endpoints ({clients.length})
          </div>
          {clients.length===0&&(
            <div style={{padding:'24px 16px',color:'#334155',fontSize:13,textAlign:'center'}}>
              <div style={{fontSize:24,marginBottom:8}}>🖥</div>
              No agents connected
            </div>
          )}
          {clients.map(c=>{
            const sel=selected?.client_id===c.client_id;
            const lvl=lvlOf(c.max_risk_score);
            return (
              <div key={c.client_id} onClick={()=>onSelect(sel?null:c)} style={{
                padding:'10px 14px',cursor:'pointer',transition:'background 0.1s',
                background:sel?'#1e293b':'transparent',
                borderLeft:`3px solid ${sel?RISK[lvl].dot:'transparent'}`,
              }}>
                <div style={{fontSize:13,fontWeight:600,color:'#e2e8f0',
                  overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                  {c.hostname}
                </div>
                <div style={{marginTop:4}}><RiskBadge level={lvl} score={c.max_risk_score}/></div>
                <div style={{fontSize:11,color:'#475569',marginTop:3}}>{c.ip}</div>
                <div style={{fontSize:10,color:'#334155',marginTop:1}}>
                  {fmtTime(c.last_seen)}
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    function FilterBar({filter,onChange}){
      return (
        <div style={{display:'flex',gap:8,padding:'12px 20px',
          borderBottom:'1px solid #1e293b',flexShrink:0,alignItems:'center'}}>
          <span style={{fontSize:12,color:'#475569',marginRight:4}}>Filter:</span>
          {['ALL','HIGH','MED','LOW'].map(opt=>{
            const active=filter===opt;
            const color=opt!=='ALL'?RISK[opt]?.dot:'#60a5fa';
            return (
              <button key={opt} onClick={()=>onChange(opt)} style={{
                padding:'4px 14px',borderRadius:9999,cursor:'pointer',fontSize:13,
                border:active?`1.5px solid ${color}`:'1.5px solid #334155',
                background:active?'#1e293b':'transparent',
                color:active?color:'#94a3b8',fontWeight:active?700:500,
              }}>{opt}</button>
            );
          })}
        </div>
      );
    }

    function ClientDetail({client,onClear}){
      if(!client) return null;
      const lvl=lvlOf(client.max_risk_score);
      return (
        <div style={{background:'#1e293b',borderBottom:'1px solid #334155',
          padding:'12px 20px',display:'flex',alignItems:'center',gap:16,flexShrink:0}}>
          <div style={{flex:1}}>
            <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
              <span style={{fontSize:15,fontWeight:700,color:'#f1f5f9'}}>{client.hostname}</span>
              <RiskBadge level={lvl} score={client.max_risk_score}/>
            </div>
            <div style={{marginTop:3,fontSize:12,color:'#64748b'}}>
              {client.ip} · Last seen: {fmtTime(client.last_seen)}
            </div>
          </div>
          <button onClick={onClear} style={{background:'transparent',border:'1px solid #334155',
            color:'#94a3b8',borderRadius:6,padding:'4px 12px',fontSize:13,cursor:'pointer'}}>
            Clear
          </button>
        </div>
      );
    }

    function EventCard({ev}){
      const lvl=ev.risk_level||'LOW';
      const s=RISK[lvl]||RISK.LOW;
      return (
        <div style={{background:'#1e293b',border:'1px solid #334155',
          borderLeft:`3px solid ${s.dot}`,borderRadius:8,
          padding:'10px 14px',display:'flex',gap:12,alignItems:'flex-start'}}>
          <div style={{paddingTop:1,flexShrink:0}}>
            <RiskBadge level={lvl} score={ev.risk_score}/>
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap',marginBottom:3}}>
              <span style={{fontSize:11,fontWeight:700,color:'#fff',
                background:TYPE_COLOR[ev.event_type]||'#334155',
                borderRadius:4,padding:'1px 7px',letterSpacing:'0.04em'}}>
                {ev.event_type}
              </span>
              <span style={{fontSize:13,fontWeight:600,color:'#cbd5e1'}}>{ev.hostname}</span>
              {ev.after_hours&&(
                <span style={{fontSize:11,color:'#a78bfa',fontWeight:600}}>after-hours</span>
              )}
            </div>
            <div style={{fontSize:13,color:'#94a3b8',overflow:'hidden',
              textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
              {summary(ev)}
            </div>
          </div>
          <div style={{fontSize:11,color:'#475569',whiteSpace:'nowrap',paddingTop:2,flexShrink:0}}>
            {fmtTime(ev.timestamp)}
          </div>
        </div>
      );
    }

    function EventFeed({events,filter,selected}){
      const filtered=events.filter(e=>{
        if(filter!=='ALL'&&e.risk_level!==filter) return false;
        if(selected&&e.client_id!==selected.client_id) return false;
        return true;
      });
      if(filtered.length===0){
        return (
          <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',
            justifyContent:'center',color:'#334155',gap:12}}>
            <div style={{fontSize:40}}>📭</div>
            <div style={{fontSize:14}}>No events match the current filter</div>
          </div>
        );
      }
      return (
        <div style={{flex:1,overflowY:'auto',padding:'12px 20px',
          display:'flex',flexDirection:'column',gap:8}}>
          {filtered.map(ev=><EventCard key={ev.id} ev={ev}/>)}
        </div>
      );
    }

    // -------------------------------------------------------------------------
    // Main app
    // -------------------------------------------------------------------------
    function App(){
      const [state,dispatch]=useReducer(reducer,initialState);
      const lastIdRef=useRef(0);

      const poll=useCallback(async()=>{
        try{
          const [er,cr,sr]=await Promise.all([
            fetch(`${API_BASE}/events?since=${lastIdRef.current}&limit=50`),
            fetch(`${API_BASE}/clients`),
            fetch(`${API_BASE}/stats`),
          ]);
          if(!er.ok||!cr.ok||!sr.ok) throw new Error('HTTP '+er.status);
          const evts=await er.json();
          const clients=await cr.json();
          const stats=await sr.json();
          if(evts.length>0){lastIdRef.current=evts[0].id;dispatch({type:'PREPEND',payload:evts});}
          dispatch({type:'SET_CLIENTS',payload:clients});
          dispatch({type:'SET_STATS',payload:stats});
          dispatch({type:'SET_ERROR',payload:null});
        }catch(e){
          dispatch({type:'SET_ERROR',payload:'Cannot reach server'});
        }
      },[]);

      // Live polling
      useEffect(()=>{
        if(state.demoMode) return;
        poll();
        const id=setInterval(poll,POLL_INTERVAL);
        return ()=>clearInterval(id);
      },[state.demoMode,poll]);

      // Demo ticker
      useEffect(()=>{
        if(!state.demoMode) return;
        const id=setInterval(()=>dispatch({type:'PREPEND',payload:[genDemoEvent()]}),2000);
        return ()=>clearInterval(id);
      },[state.demoMode]);

      // Derive demo clients/stats from events
      useEffect(()=>{
        if(!state.demoMode) return;
        dispatch({type:'SET_CLIENTS',payload:buildDemoClients(state.events)});
        const h=state.events.filter(e=>e.risk_level==='HIGH').length;
        const m=state.events.filter(e=>e.risk_level==='MED').length;
        const l=state.events.filter(e=>e.risk_level==='LOW').length;
        dispatch({type:'SET_STATS',payload:{total:state.events.length,high:h,med:m,low:l,active_clients:buildDemoClients(state.events).length}});
      },[state.events,state.demoMode]);

      const handleToggleDemo=useCallback(()=>{lastIdRef.current=0;dispatch({type:'TOGGLE_DEMO'});},[]);

      return (
        <div style={{display:'flex',flexDirection:'column',height:'100vh',
          background:'#0f172a',color:'#f1f5f9',
          fontFamily:"'Segoe UI',system-ui,sans-serif",overflow:'hidden'}}>

          <TopBar demoMode={state.demoMode} onToggle={handleToggleDemo} error={state.error}/>
          <StatCards stats={state.stats}/>

          {/* Body */}
          <div style={{display:'flex',flex:1,overflow:'hidden',marginTop:16}}>
            <ClientSidebar
              clients={state.clients}
              selected={state.selectedClient}
              onSelect={c=>dispatch({type:'SELECT',payload:c})}
            />
            <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
              <FilterBar filter={state.filter} onChange={f=>dispatch({type:'SET_FILTER',payload:f})}/>
              <ClientDetail
                client={state.selectedClient}
                onClear={()=>dispatch({type:'SELECT',payload:null})}
              />
              <EventFeed
                events={state.events}
                filter={state.filter}
                selected={state.selectedClient}
              />
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
